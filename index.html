document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

pan><span style=\"font-size:14px;font-weight:500;color:#FAFBFC\">super id · agente<\u002Fspan><\u002Fdiv>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:#7E848C;text-transform:uppercase\">ao vivo<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:26px 24px 28px;min-height:300px;display:flex;flex-direction:column;gap:16px\">\n            <div style=\"align-self:flex-end;max-width:84%\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#7E848C;text-align:right;margin-bottom:7px\">Você<\u002Fdiv>\n              <div style=\"background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:16px 16px 4px 16px;padding:14px 17px;font-size:15px;color:#FAFBFC;font-weight:300;line-height:1.45\">{{ demoTyped }}<sc-if value=\"{{ demoTyping }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-block;width:2px;height:1.05em;background:#E2E6EA;margin-left:3px;vertical-align:-3px;animation:blink 1s steps(1) infinite\"><\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ demoLines }}\" as=\"d\" hint-placeholder-count=\"2\">\n              <sc-if value=\"{{ d.visible }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"align-self:flex-start;max-width:90%;display:flex;align-items:center;gap:12px;background:#0e0f12;border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:14px 16px;animation:fadein .4s ease both\">\n                  <sc-if value=\"{{ d.done }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.45);color:#FAFBFC;display:grid;place-items:center;font-size:11px;flex:0 0 auto\">✓<\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{ d.active }}\" hint-placeholder-val=\"{{ true }}\"><span style=\" \u002Fdiv>\n          <p style=\"margin:12px 0 22px;font-size:14.5px;line-height:1.6;color:#52565D;font-weight:300\">O agente age por você: marca a consulta, compra o produto, resolve o reembolso. Você não levanta um dedo.<\u002Fp>\n          <div style=\"margin-top:auto;display:flex;flex-direction:column;gap:9px\">\n            <div style=\"display:flex;align-items:center;gap:11px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 15px\"><span style=\"width:20px;height:20px;border-radius:50%;background:#0E0F11;color:#FAFBFC;display:grid;place-items:center;font-size:10px;flex:0 0 auto\">✓<\u002Fspan><span style=\"font-size:13.5px;color:#16181b\">Consulta marcada<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:11px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 15px\"><span style=\"width:20px;height:20px;border-radius:50%;background:#0E0F11;color:#FAFBFC;display:grid;place-items:center;font-size:10px;flex:0 0 auto\">✓<\u002Fspan><span style=\"font-size:13.5px;color:#16181b\">Reembolso solicitado<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:11px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 15px\"><span style=\"width:20px;height:20px;border-radius:50%;background:#0E0F11;color:#FAFBFC;display:grid;place-items:center;font-size:10px;flex:0 0 auto\">✓<\u002Fspan><span style=\"font-size:13.5px;color:#16181b\">Stack reposta em casa<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#0E0F11;border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:32px 30px;display:flex;flex-direction:column;color:#E2E6EA;position:relative;overflow:hidden;transition:transform .4s cubic-bezier(.2,.7,.2,1),box-shadow .4s\" style-hover=\"{{ liftDark }}\">\n          <div style=\"position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#6a6f76,#E2E6EA,#6a6f76,transparent)\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#7E848C\">03 — Antecipa<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:26px;font-weight:600;letter-spacing:-.015em;color:#FAFBFC\">Faz render<\u002Fdiv>\n          <p style=\"margin:12px 0 22px;font-size:14.5px;line-height:1.6;color:#B7BCC2;font-weight:300\">Antecipa o seu cuidado com um médico personalizado: o que medir, melhorar e tomar. O dividendo é longevidade.<\u002Fp>\n          <div style=\"margin-top:auto;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 17px\">\n            <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px\"><div><div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#7E848C\">Projeção<\u002Fdiv><div style=\"font-size:15px;color:#FAFBFC;font-weight:500;margin-top:4px\">Anos de vida saudável<\u002Fdiv><\u002Fdiv><span style=\"font-family:'JetBrains Mono',monospace;font-size:20px;color:#FAFBFC;letter-spacing:-.01em\">+8,4<\u002Fspan><\u002Fdiv>\n            <svg viewBox=\"0 0 240 56\" style=\"width:100%;height:auto;display:block\" fill=\"none\"><defs><linearGradient id=\"lv\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"rgba(226,230,234,.35)\"><\u002Fstop><stop offset=\"1\" stop-color=\"rgba(226,230,234,0)\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs><path d=\"M0 46 C 50 42, 80 30, 120 24 S 200 8, 240 6\" stroke=\"#E2E6EA\" stroke-width=\"1.6\" fill=\"none\"><\u002Fpath><path d=\"M0 46 C 50 42, 80 30, 120 24 S 200 8, 240 6 L240 56 L0 56Z\" fill=\"url(#lv)\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n      <p class=\"re p>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"display:flex;flex-direction:column;align-items:center;gap:0\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;max-width:420px\">\n          <div style=\"background:#FAFBFC;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 10px;text-align:center;font-size:12px;color:#7E848C\">Operadora<\u002Fdiv>\n          <div style=\"background:#FAFBFC;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 10px;text-align:center;font-size:12px;color:#7E848C\">Hospital<\u002Fdiv>\n          <div style=\"background:#FAFBFC;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 10px;text-align:center;font-size:12px;color:#7E848C\">Laboratório<\u002Fdiv>\n          <div style=\"background:#FAFBFC;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 10px;text-align:center;font-size:12px;color:#7E848C\">Farmácia<\u002Fdiv>\n          <div style=\"background:#FAFBFC;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 10px;text-align:center;font-size:12px;color:#7E848C\">Wearable<\u002Fdiv>\n          <div style=\"background:#FAFBFC;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 10px;text-align:center;font-size:12px;color:#7E848C\">Médicos<\u002Fdiv>\n        <\u002Fdiv>\n        <svg viewBox=\"0 0 200 56\" style=\"width:60%;max-width:240px;height:44px;display:block\" fill=\"none\"><path d=\"M30 0 C 30 36, 100 20, 100 54\" stroke=\"#B7BCC2\" stroke-width=\"1\" stroke-dasharray=\"3 4\"><\u002Fpath><path d=\"M100 0 L100 54\" stroke=\"#B7BCC2\" stroke-width=\"1\" stroke-dasharray=\"3 4\"><\u002Fpath><path d=\"M170 0 C 170 36, 100 20, 100 54\" stroke=\"#B7BCC2\" stroke-width=\"1\" stroke-dasharray=\"3 4\"><\u002Fpath><\u002Fsvg>\n        <div style=\"position:relative;overflow:hidden;background:radial-gradient(130% 140% at 26% 14%,#26282c,#0a0b0d 66%);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px 30px;display:flex;align-items:center;gap:13px;box-shadow:0 36px 70px -34px rgba(0,0,0,.6)\">\n          <div style=\"position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#6a6f76,#E2E6EA,#6a6f76,transparent)\"><\u002Fdiv>\n          <img src=\"43fbb5fb-7b59-4acb-8e7c-623a29fe6575\" style=\"width:96px;filter:invert(1)\" alt=\"super id\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#B7BCC2;border-left:1px solid rgba(255,255,255,.16);padding-left:13px\">camada<br>neutra<\u002Fspan>\n        <\u002Fdiv>\n        <svg viewBox=\"0 0 200 40\" style=\"width:30%;max-width:120px;height:32px;display:block\" fill=\"none\"><path d=\"M100 0 L100 28 M92 20 L100 30 L108 20\" stroke=\"#9398a0\" stroke-width=\"1.4\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#16181b;font-weight:500\">Você<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7 · O SEU SUPER ID -->\n  <section data-screen-label=\"O cartão\" id=\"cartao\" style=\"position:relative;overflow:hidden;background:radial-gradient(90% 60% at 80% 0%,rgba(52,55,60,.5),transparent 55%),#060607;color:#E2E6EA;padding:clamp(96px,13vw,180px) clamp(20px,4vw,52px)\">\n    <div style=\"position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#6a6f76,#E2E6EA,#6a6f76,transparent);opacity:.5\"><\u002Fdiv>\n    <div data-2col=\"\" style=\"position:relative;max-width:1180px;margin:0 auto;display:grid;grid-template-columns:.92fr 1.08fr;gap:clamp(40px,6vw,80px);align-items:center\">\n      <div class=\"reveal\">\n        <div style=\"display:inline-flex;align-items:center;gap:11px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#7E848C;margin-bottom:22px\"><span style=\"width:26px;height:1px;background:#52565D\"><\u002Fspan>O seu super id<\u002Fdiv>\n        <h2 style=\"font-size:clamp(32px,4.8vw,60px);font-weight:500;line-height:1.02;letter-spacing:-.028em;margin:0;color:#FAFBFC\">O novo símbolo de <span style=\"color:#9398a0\">quem se cuida.<\u002Fspan><\u002Fh2>\n        <p style=\"font-size:clamp(16px,1.8vw,20px);line-height:1.62;color:#B7BCC2;font-weight:300;margin:24px 0 0;max-width:46ch\">Não é um cartão de banco. É a prova de que a sua saúde está sob gestão — e a chave que carrega toda a sua história, com você.<\u002Fp>\n        <div style=\"display:flex;gap:30px;margin-top:36px;flex-wrap:wrap\">\n          <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:26px;color:#FAFBFC;letter-spacing:-.01em\">Nº 0007<\u002Fdiv><div style=\"font-size:12.5px;color:#7E848C;margin-top:4px\">membro numerado<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"display:flex;justify-content:center;perspective:1500px\">\n        <div style=\"width:min(480px,100%);aspect-ratio:1.586/1;border-radius:22px;position:relative;overflow:hidden;background:radial-gradient(130% 150% at 22% 10%,#2a2c30 0%,#141519 30%,#0a0b0d 62%,#040405 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 70px 110px -44px rgba(0,0,0,.85),0 16px 40px -20px #000;border:1px solid rgba(255,255,255,.08);padding:30px 32px;color:#E2E6EA;transform:rotateX(7deg) rotateY(-12deg);animation:floaty 9s ease-in-out infinite;--rot:0deg\">\n          <div style=\"position:absolute;top:0;bottom:0;left:0;width:42%;background:linear-gradient(122deg,transparent 30%,rgba(255,255,255,.18) 50%,transparent 70%);animation:shimmer 7s ease-in-out infinite\"><\u002Fdiv>\n          <div style=\"position:absolute;inset:0;border-radius:22px;padding:1px;background:linear-gradient(135deg,rgba(255,255,255,.55),rgba(106,111,118,.3) 38%,transparent 58%,rgba(226,230,234,.45));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none\"><\u002Fdiv>\n          <div style=\"position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#6a6f76,#E2E6EA,#6a6f76,transparent)\"><\u002Fdiv>\n          <div style=\"position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:space-between\">\n            <div style=\"display:flex;align-items:flex-start;justify-content:space-between\"><img src=\"43fbb5fb-7b59-4acb-8e7c-623a29fe6575\" style=\"width:108px;filter:invert(1)\" alt=\"super id\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.2em;color:#B7BCC2;text-align:right;line-height:1.6\">MEMBRO<br>FUNDADOR<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:14px\"><div style=\"width:46px;height:35px;border-radius:7px;background:linear-gradient(135deg,#C9CED4,#8a9097 50%,#C9CED4);box-shadow:inset 0 0 0 1px rgba(255,255,255,.35),inset 0 -2px 3px rgba(0,0,0,.3)\"><\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.22em;color:#B7BCC2\">4421 9920 0042<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-end;justify-content:space-between\"><div><div style=\"font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:#7E848C\">Membro desde<\u002Fdiv><div style=\"font-weight:500;font-size:16px;letter-spacing:.06em;text-transform:uppercase;margin-top:4px;color:#FAFBFC\">Daniel R. · 2026<\u002Fdiv><\u002Fdiv><div style=\"width:36px;height:36px;border-radius:9px;background:radial-gradient(130% 130% at 28% 18%,#26282c,#0a0a0c 66%);display:grid;place-items:center;font-weight:500;font-size:14px;color:#FAFBFC;border:1px solid rgba(255,255,255,.1)\">id<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 8 · A LISTA + FECHO -->\n  <section data-screen-label=\"A lista\" id=\"lista\" style=\"position:relative;overflow:hidden;background:radial-gradient(80% 70% at 50% 0%,rgba(52,55,60,.42),transparent 58%),#060607;color:#E2E6EA;border-top:1px solid rgba(255,255,255,.08);padding:clamp(96px,13vw,180px) clamp(20px,4vw,52px)\">\n    <div style=\"position:relative;max-width:680px;margin:0 auto;text-align:center\">\n      <div class=\"reveal\">\n        <div style=\"display:inline-flex;align-items:center;gap:11px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#7E848C;margin-bottom:28px\"><span style=\"width:26px;height:1px;background:#52565D\"><\u002Fspan>Acesso<span style=\"width:26px;height:1px;background:#52565D\"><\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-size:clamp(34px,5.4vw,68px);font-weight:500;line-height:1;letter-spacing:-.03em;margin:0;color:#FAFBFC\">Começa com poucos.<br><span style=\"color:#9398a0\">Por enquanto.<\u002Fspan><\u002Fh2>\n        <p style=\"font-size:clamp(16px,1.8vw,19px);line-height:1.6;color:#B7BCC2;font-weight:300;margin:24px auto 0;max-width:44ch\">Membros-fundadores, por convite. Entre na lista — e suba na fila indicando quem você cuida.<\u002Fp>\n      <\u002Fdiv>\n      <sc-if value=\"{{ notJoined }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ submitForm }}\" class=\"reveal\" style=\"margin:38px auto 0;max-width:440px;display:flex;flex-direction:column;gap:10px\">\n          <input type=\"text\" required=\"\" placeholder=\"Seu nome\" style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:13px;padding:15px 18px;font-size:15px;color:#FAFBFC;outline:none\">\n          <input type=\"email\" required=\"\" placeholder=\"seu@email.com\" style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:13px;padding:15px 18px;font-size:15px;color:#FAFBFC;outline:none\">\n          <button type=\"submit\" style=\"font-size:15.5px;font-weight:500;color:#0E0F11;background:#FAFBFC;border:0;padding:16px;border-radius:13px;cursor:pointer;box-shadow:0 18px 36px -18px rgba(255,255,255,.4)\">Entrar na lista<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ joined }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"reveal\" style=\"margin:38px auto 0;max-width:440px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:24px;animation:fadein .4s both\">\n          <div style=\"display:inline-flex;align-items:center;gap:10px\"><span style=\"width:24px;height:24px;border-radius:50%;background:#FAFBFC;color:#0E0F11;display:grid;place-items:center;font-size:12px\">✓<\u002Fspan><span style=\"font-size:16px;color:#FAFBFC;font-weight:500\">Você está na lista.<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:14px;color:#B7BCC2;font-weight:300;margin:14px 0 0;line-height:1.5\">Suba na fila indicando quem você cuida — pais, filhos, parceiro. Cuidar dos seus também é cuidar de você.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <div class=\"reveal\" style=\"position:relative;max-width:1100px;margin:clamp(80px,11vw,150px) auto 0;text-align:center\">\n      <p style=\"font-size:clamp(34px,6.6vw,90px);font-weight:500;line-height:.98;letter-spacing:-.035em;margin:0;color:#FAFBFC\">O cuidado que poucos tinham.<br><span style=\"color:#9398a0\">Agora é seu.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<footer style=\"background:#0a0b0d;color:#B7BCC2;border-top:1px solid rgba(255,255,255,.08);padding:clamp(56px,7vw,86px) clamp(20px,4vw,52px) 40px\">\n  <div style=\"max-width:1240px;margin:0 auto\">\n    <div data-foot=\"\" style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:40px\">\n      <div>\n        <img src=\"43fbb5fb-7b59-4acb-8e7c-623a29fe6575\" style=\"width:118px;filter:invert(1);margin-bottom:18px\" alt=\"super id\">\n        <p style=\"font-size:14px;line-height:1.6;color:#7E848C;font-weight:300;max-width:34ch;margin:0\">A sua gestora de saúde. Uma IA que conhece toda a sua história — e cuida dela por você.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#52565D;margin-bottom:16px\">O gestor<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14px\"><a href=\"#duas\" style=\"color:#B7BCC2\" style-hover=\"{{ footLink }}\">Duas saúdes<\u002Fa><a href=\"#gestor\" style=\"color:#B7BCC2\" style-hover=\"{{ footLink }}\">Você fala, ele executa<\u002Fa><a href=\"#gerencia\" style=\"color:#B7BCC2\" style-hover=\"{{ footLink }}\">Como ele gerencia<\u002Fa><a href=\"#lado\" style=\"color:#B7BCC2\" style-hover=\"{{ footLink }}\">De que lado ele está<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#52565D;margin-bottom:16px\">Membership<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14px\"><a href=\"#cartao\" style=\"color:#B7BCC2\" style-hover=\"{{ footLink }}\">O seu super id<\u002Fa><a href=\"#lista\" style=\"color:#B7BCC2\" style-hover=\"{{ footLink }}\">Entrar na lista<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:20px;margin-top:clamp(40px,5vw,60px);padding-top:26px;border-top:1px solid rgba(255,255,255,.08);flex-wrap:wrap\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#52565D;text-transform:uppercase\">© 2026 super id · a sua gestora de saúde<\u002Fdiv>\n      <div style=\"display:flex;gap:22px;font-size:12px;color:#52565D\"><a href=\"#\" style=\"color:#52565D\" style-hover=\"{{ footLink }}\">Privacidade<\u002Fa><a href=\"#\" style=\"color:#52565D\" style-hover=\"{{ footLink }}\">Termos<\u002Fa><span style=\"font-family:'JetBrains Mono',monospace\">Brasil · 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:900},&quot;gridIntensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:100,&quot;min&quot;:0,&quot;max&quot;:100,&quot;step&quot;:10,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Aparência&quot;},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Movimento&quot;},&quot;demoAutoplay&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Movimento&quot;}}\">\nclass Component extends DCLogic {\n  USER_MSG = 'Marca uma consulta pra quarta, 16h30 — tô com dor de garganta.';\n  state = { nav: null, mobile: false, demo: { typed: '', step: 3 }, submitted: false };\n\n  onNavEnter = (e) => { const v = e.currentTarget.dataset.nav; this.setState({ nav: v === 'none' ? null : v }); };\n  onNavClick = (e) => { const v = e.currentTarget.dataset.nav; this.setState({ nav: this.state.nav === v ? null : v }); };\n  closeNav = () => { if (this.state.nav) this.setState({ nav: null }); };\n  toggleMobile = (e) => { e.stopPropagation(); this.setState({ mobile: !this.state.mobile }); };\n  closeMobile = () => this.setState({ mobile: false });\n  submitForm = (e) => { e.preventDefault(); this.setState({ submitted: true }); };\n\n  startDemo = () => {\n    this._clearTimers();\n    this.setState({ demo: { typed: '', step: 0 } });\n    let i = 0;\n    this._type = setInterval(() => {\n      i++;\n      this.setState(s => ({ demo: { ...s.demo, typed: this.USER_MSG.slice(0, i) } }));\n      if (i >= this.USER_MSG.length) { clearInterval(this._type); this._type = null; this._schedule(); }\n    }, 30);\n  };\n  _schedule() {\n    this._t1 = setTimeout(() => this.setState(s => ({ demo: { ...s.demo, step: 1 } })), 600);\n    this._t2 = setTimeout(() => this.setState(s => ({ demo: { ...s.demo, step: 2 } })), 1600);\n    this._t3 = setTimeout(() => this.setState(s => ({ demo: { ...s.demo, step: 3 } })), 2700);\n    this._loop = setTimeout(() => this.startDemo(), 7000);\n  }\n  _clearTimers() { [this._type, this._t1, this._t2, this._t3, this._loop].forEach(t => { if (t) { clearInterval(t); clearTimeout(t); } }); this._type = this._t1 = this._t2 = this._t3 = this._loop = null; }\n\n  _applyMotion() {\n    const reduce = this.props.reduceMotion ?? false;\n    let s = document.getElementById('__rm-superid');\n    if (reduce) { if (!s) { s = document.createElement('style'); s.id = '__rm-superid'; document.head.appendChild(s); } s.textContent = '*{animation:none!important}'; }\n    else if (s) { s.remove(); }\n  }\n  componentDidMount() {\n    this._applyMotion();\n    const reduce = this.props.reduceMotion ?? false;\n    const autoplay = this.props.demoAutoplay ?? true;\n    if (!reduce) {\n      this._onScroll = () => { const el = document.getElementById('heroCardWrap'); if (el) el.style.transform = 'translateY(' + (window.scrollY * 0.05) + 'px)'; };\n      window.addEventListener('scroll', this._onScroll, { passive: true });\n    }\n    if (!reduce && autoplay) { this._loop = setTimeout(this.startDemo, 1000); }\n  }\n  componentDidUpdate() { this._applyMotion(); }\n  componentWillUnmount() { this._clearTimers(); if (this._onScroll) window.removeEventListener('scroll', this._onScroll); }\n\n  renderVals() {\n    const step = this.state.demo.step;\n    const defs = ['Conectando com a agenda do seu médico…', 'Enviando seu histórico completo…'];\n    const demoLines = defs.map((text, idx) => { const n = idx + 1; const visible = step >= n; const done = step >= n + 1; return { text, visible, done, active: visible && !done }; });\n    return {\n      navGestor: this.state.nav === 'gestor',\n      navMember: this.state.nav === 'member',\n      mobile: this.state.mobile,\n      onNavEnter: this.onNavEnter, onNavClick: this.onNavClick, closeNav: this.closeNav,\n      toggleMobile: this.toggleMobile, closeMobile: this.closeMobile,\n      ddHover: { background: 'rgba(0,0,0,.04)' },\n      liftCard: { transform: 'translateY(-4px)', boxShadow: '0 28px 50px -30px rgba(0,0,0,.42)' },\n      liftDark: { transform: 'translateY(-4px)', boxShadow: '0 30px 60px -28px rgba(0,0,0,.7)', borderColor: 'rgba(255,255,255,.18)' },\n      footLink: { color: '#FAFBFC' },\n      gridOpacity: (this.props.gridIntensity ?? 100) / 100,\n      demoTyped: this.state.demo.typed,\n      demoTyping: step < 3,\n      demoLines,\n      demoConfirmed: step >= 3,\n      submitForm: this.submitForm,\n      joined: this.state.submitted === true,\n      notJoined: this.state.submitted !== true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
